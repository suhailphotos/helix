---
- name: Only run on macOS
  meta: end_host
  when: ansible_facts['system'] != "Darwin"

# Find Homebrew
- name: Detect Homebrew (Apple Silicon path)
  stat:
    path: /opt/homebrew/bin/brew
  register: brew_path_opt

- name: Detect Homebrew (Intel path)
  stat:
    path: /usr/local/bin/brew
  register: brew_path_usr

- name: Fail if Homebrew not found
  fail:
    msg: "Homebrew not found. Run the base macOS play first."
  when: not brew_path_opt.stat.exists and not brew_path_usr.stat.exists

- name: Set brew_bin path fact
  set_fact:
    brew_bin: "{{ '/opt/homebrew/bin/brew' if brew_path_opt.stat.exists else '/usr/local/bin/brew' }}"

# Build final list: baseline + host extras – host skips
- name: Build desktop cask target list
  set_fact:
    desktop_casks_final: >-
      {{ ((desktop_casks | default([])) + (desktop_casks_extra | default([])))
         | unique
         | difference(desktop_casks_skip | default([])) }}

# Split casks into standard vs privileged installers
- name: Build standard desktop cask list
  set_fact:
    desktop_casks_standard: >-
      {{ desktop_casks_final
         | difference(desktop_casks_need_sudo | default([])) }}

- name: Build privileged desktop cask list
  set_fact:
    desktop_casks_privileged: >-
      {{ desktop_casks_final
         | intersect(desktop_casks_need_sudo | default([])) }}

# Pass 1: standard casks
- name: Try install/overwrite standard casks with --force (with retries)
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
    path: "{{ brew_bin }}"
    install_options:
      - force
  loop: "{{ desktop_casks_standard }}"
  loop_control:
    label: "{{ item }}"
  register: cask_try_standard
  retries: 3
  delay: 20
  until: cask_try_standard is succeeded
  ignore_errors: true

# Pass 2: graceful fallback for failed standard casks
- name: Accept external apps for failed standard items
  community.general.homebrew_cask:
    name: "{{ item.item }}"
    state: present
    path: "{{ brew_bin }}"
    accept_external_apps: true
  when: item.failed | default(false)
  loop: "{{ cask_try_standard.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"

- name: Assert become password is available for privileged casks
  assert:
    that:
      - (ansible_become_pass | default(ansible_become_password, true) | string | length) > 0
    fail_msg: "No become password is available for privileged casks."
  when: (desktop_casks_privileged | length) > 0
  no_log: true

# Pass 3: privileged casks that need sudo / installer.pkg
- name: Try install/overwrite privileged casks with --force (with retries)
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
    path: "{{ brew_bin }}"
    install_options:
      - force
    sudo_password: "{{ ansible_become_pass | default(ansible_become_password, true) }}"
  loop: "{{ desktop_casks_privileged }}"
  loop_control:
    label: "{{ item }}"
  register: cask_try_privileged
  retries: 3
  delay: 20
  until: cask_try_privileged is succeeded
  ignore_errors: true
  no_log: true

# Pass 4: graceful fallback for failed privileged casks
- name: Accept external apps for failed privileged items
  community.general.homebrew_cask:
    name: "{{ item.item }}"
    state: present
    path: "{{ brew_bin }}"
    accept_external_apps: true
    sudo_password: "{{ ansible_become_pass | default(ansible_become_password, true) }}"
  when: item.failed | default(false)
  loop: "{{ cask_try_privileged.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  no_log: true

# Pass 4: graceful fallback for failed privileged casks
- name: Accept external apps for failed privileged items
  community.general.homebrew_cask:
    name: "{{ item.item }}"
    state: present
    path: "{{ brew_bin }}"
    accept_external_apps: true
    sudo_password: "{{ ansible_become_password | default(omit) }}"
  when: item.failed | default(false)
  loop: "{{ cask_try_privileged.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
